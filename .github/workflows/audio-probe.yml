name: Audio Probe
on:
  workflow_dispatch:
    inputs:
      audio_url:
        required: false
        type: string
        default: ''
      audio_base64:
        required: false
        type: string
        default: ''
      output_files_json:
        required: true
        type: string
      command_id:
        required: true
        type: string
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
      - name: Download audio
        run: |
          mkdir -p /tmp/audio_in
          if [ -n "${{ github.event.inputs.audio_url }}" ]; then
            curl -L --retry 3 --max-time 120 -o /tmp/audio_in/input_audio "${{ github.event.inputs.audio_url }}"
          elif [ -n "${{ github.event.inputs.audio_base64 }}" ]; then
            echo "${{ github.event.inputs.audio_base64 }}" | base64 -d > /tmp/audio_in/input_audio
          fi
      - name: Analysis
        run: |
          echo "Starting analysis..."
          echo '{"type":"audio_probe","command_id":"${{ github.event.inputs.command_id }}","status":"completed"}' > /tmp/result.json
      - name: Upload
        run: |
          echo "Upload result"
